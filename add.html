<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入周杰伦歌迷大家庭</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/add.css">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="add-bg-decor">
        <div class="bg-note note-1">♪</div>
        <div class="bg-note note-2">♫</div>
        <div class="bg-note note-3">♩</div>
        <div class="bg-note note-4">♬</div>
        <div class="bg-note note-5">🎵</div>
        <div class="bg-glow glow-1"></div>
        <div class="bg-glow glow-2"></div>
    </div>

    <div class="container">
        <div class="form-card">
            <!-- 顶部装饰条 -->
            <div class="card-top-bar"></div>

            <div class="form-header">
                <div class="header-icon">
                    <i class="fa-solid fa-music"></i>
                </div>
                <h1>点亮你的坐标</h1>
                <p class="header-sub">加入周杰伦歌迷大家庭，让世界看到你的位置</p>
                <p class="header-quote">"哎哟，不错哦"</p>
            </div>

            <form id="join-form">
                <!-- 步骤1：昵称 -->
                <div class="form-step">
                    <div class="step-badge">1</div>
                    <div class="step-content">
                        <div class="form-group">
                            <label for="nickname"><i class="fa-solid fa-user"></i> 你的昵称</label>
                            <input type="text" id="nickname" class="form-control" placeholder="给自己取个酷炫的名字吧" maxlength="10" required>
                            <div class="input-hint">最多 10 个字</div>
                        </div>
                    </div>
                </div>

                <!-- 步骤2：头像 -->
                <div class="form-step">
                    <div class="step-badge">2</div>
                    <div class="step-content">
                        <div class="form-group">
                            <label><i class="fa-solid fa-image"></i> 选择头像</label>

                            <div class="avatar-section">
                                <div class="avatar-upload-box" id="avatar-upload-box">
                                    <div class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                                    <div class="upload-text">上传图片</div>
                                    <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
                                </div>
                                <div class="avatar-preview-box" id="avatar-preview">
                                    <span style="font-size: 28px;">👤</span>
                                </div>
                            </div>

                            <div class="avatar-divider">
                                <span>或者选择 Emoji</span>
                            </div>

                            <div class="avatar-grid" id="avatar-selector">
                                <div class="avatar-option" data-val="🎵">🎵</div>
                                <div class="avatar-option" data-val="🎶">🎶</div>
                                <div class="avatar-option" data-val="🎤">🎤</div>
                                <div class="avatar-option" data-val="🎧">🎧</div>
                                <div class="avatar-option" data-val="🎸">🎸</div>
                                <div class="avatar-option" data-val="🎹">🎹</div>
                                <div class="avatar-option" data-val="💃">💃</div>
                                <div class="avatar-option" data-val="🕺">🕺</div>
                                <div class="avatar-option" data-val="🌟">🌟</div>
                                <div class="avatar-option" data-val="✨">✨</div>
                                <div class="avatar-option" data-val="🔥">🔥</div>
                                <div class="avatar-option" data-val="💖">💖</div>
                                <div class="avatar-option" data-val="🦋">🦋</div>
                                <div class="avatar-option" data-val="🐱">🐱</div>
                                <div class="avatar-option" data-val="🦊">🦊</div>
                                <div class="avatar-option" data-val="🐼">🐼</div>
                            </div>
                            <input type="hidden" id="avatar" name="avatar" required>
                        </div>
                    </div>
                </div>

                <!-- 步骤3：位置 -->
                <div class="form-step">
                    <div class="step-badge">3</div>
                    <div class="step-content">
                        <div class="form-group">
                            <label><i class="fa-solid fa-location-dot"></i> 你的位置</label>
                            <div id="picker-map"></div>
                            <div class="location-hint">
                                <i class="fa-solid fa-hand-pointer"></i>
                                <span id="location-text">点击地图选择你的位置</span>
                            </div>
                            <input type="hidden" id="lat" name="lat" required>
                            <input type="hidden" id="lng" name="lng" required>
                        </div>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <div class="btn-group">
                    <a href="index.html" class="btn-back">
                        <i class="fa-solid fa-arrow-left"></i> 返回地图
                    </a>
                    <button type="submit" class="btn-submit">
                        <i class="fa-solid fa-rocket"></i> 加入网络
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/config.js"></script>
    <script src="js/hubs.js"></script>
    <script src="js/add.js"></script>
</body>
</html>
