<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周杰伦歌迷朋友全球分布图</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/danmaku.css">
    <link rel="stylesheet" href="css/features.css">
</head>
<body>
    <div id="app">
        <!-- 左侧面板 -->
        <div class="panel" id="panel">
            <div class="panel-header">
                <div class="panel-header-top">
                    <h2>周杰伦歌迷全球分布</h2>
                    <button class="panel-toggle-btn" id="panel-toggle-btn" title="收起面板">
                        <i class="fa-solid fa-angles-left"></i>
                    </button>
                </div>
                <div class="subtitle">"最美的不是下雨天，是曾与你躲过雨的屋檐"</div>
            </div>
            
            <div class="panel-content">
                <div class="metric-card">
                    <div class="metric-title"><i class="fa-solid fa-music"></i> 杰迷总数</div>
                    <div class="metric-value">12,450</div>
                    <div class="metric-change positive">无与伦比 <i class="fa-solid fa-heart"></i></div>
                </div>

                <div class="layer-control">
                    <h3>图层管理</h3>
                    <div class="layer-item">
                        <input type="checkbox" id="layer-hubs" checked>
                        <label for="layer-hubs">
                            <span class="switch"></span>
                            <span class="color-dot hub"></span>
                            地区歌迷会
                        </label>
                    </div>
                    <div class="layer-item">
                        <input type="checkbox" id="layer-devs" checked>
                        <label for="layer-devs">
                            <span class="switch"></span>
                            <span class="color-dot dev"></span>
                            歌迷标记点
                        </label>
                    </div>
                </div>

                <div class="danmaku-control">
                    <h3><i class="fa-solid fa-comment-dots"></i> 歌词特效</h3>
                    <div class="mode-selector">
                        <label class="mode-option active" id="mode-danmaku">
                            <input type="radio" name="lyric-mode" value="danmaku" checked>
                            <span class="mode-icon"><i class="fa-solid fa-comment"></i></span>
                            <span>弹幕</span>
                        </label>
                        <label class="mode-option" id="mode-lyric-rain">
                            <input type="radio" name="lyric-mode" value="lyric-rain">
                            <span class="mode-icon"><i class="fa-solid fa-cloud-rain"></i></span>
                            <span>歌词雨</span>
                        </label>
                        <label class="mode-option" id="mode-none">
                            <input type="radio" name="lyric-mode" value="none">
                            <span class="mode-icon"><i class="fa-solid fa-xmark"></i></span>
                            <span>关闭</span>
                        </label>
                    </div>
                    <div class="control-row">
                        <label for="lyric-opacity">透明度</label>
                        <input type="range" id="lyric-opacity" min="10" max="100" value="80">
                        <span class="control-value" id="lyric-opacity-val">80%</span>
                    </div>
                    <div class="control-row">
                        <label for="lyric-speed">速度</label>
                        <input type="range" id="lyric-speed" min="5" max="40" value="20">
                        <span class="control-value" id="lyric-speed-val">1.0x</span>
                    </div>
                    <div class="control-row">
                        <label for="lyric-density">密度</label>
                        <input type="range" id="lyric-density" min="100" max="1000" value="300" step="50">
                        <span class="control-value" id="lyric-density-val">中</span>
                    </div>
                </div>

                <!-- 创意功能区 -->
                <div class="feature-section">
                    <h3><i class="fa-solid fa-wand-magic-sparkles"></i> 创意互动</h3>
                    <div class="feature-btn-row">
                        <button class="feature-btn" id="btn-connect" title="点击两个歌迷画连线"><i class="fa-solid fa-bezier-curve"></i> 连线</button>
                        <button class="feature-btn" id="btn-nearest" title="显示最近的3个歌迷"><i class="fa-solid fa-location-crosshairs"></i> 附近</button>
                        <button class="feature-btn" id="btn-heatmap" title="歌迷密度热力图"><i class="fa-solid fa-fire"></i> 热力图</button>
                        <button class="feature-btn" id="btn-guess" title="猜歌小游戏"><i class="fa-solid fa-gamepad"></i> 猜歌</button>
                        <button class="feature-btn" id="btn-timeline" title="时光轴回放"><i class="fa-solid fa-clock-rotate-left"></i> 时光轴</button>
                    </div>
                </div>

                <!-- 季节主题 -->
                <div class="feature-section">
                    <h3><i class="fa-solid fa-palette"></i> 季节主题</h3>
                    <div class="theme-selector">
                        <div class="theme-dot active" data-theme="default" title="默认 - 粉色"></div>
                        <div class="theme-dot" data-theme="spring" title="春 - 七里香"></div>
                        <div class="theme-dot" data-theme="summer" title="夏 - 晴天"></div>
                        <div class="theme-dot" data-theme="autumn" title="秋 - 枫"></div>
                        <div class="theme-dot" data-theme="winter" title="冬 - 发如雪"></div>
                    </div>
                </div>

                <div class="chart-container">
                    <h3><i class="fa-solid fa-location-dot"></i> 歌迷会排行</h3>
                    <div class="bar-chart">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
            
            <!-- <div class="panel-footer">
                <button class="btn-primary">导出报告</button>
            </div> -->
        </div>

        <!-- 地图容器 -->
        <div id="map">
            <!-- 弹幕容器 -->
            <div id="danmaku-container"></div>
        </div>
    </div>

    <!-- 右上角工具栏 -->
    <div class="toolbar">
        <!-- 左侧面板展开按钮（面板收起时显示） -->
        <button class="panel-expand-btn" id="panel-expand-btn" title="展开面板" style="display:none;">
            <i class="fa-solid fa-angles-right"></i>
        </button>
        <a href="add.html" class="btn-icon btn-text" title="加入我们">
            <i class="fa-solid fa-plus"></i>
            <span>加入我们</span>
        </a>
        <button id="fullscreen-btn" title="全屏模式"><i class="fa-solid fa-expand"></i></button>
        <!-- <button title="搜索"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button title="分享"><i class="fa-solid fa-share-nodes"></i></button> -->
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet MarkerCluster 标记聚合插件 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/config.js"></script>
    <script src="js/hubs.js"></script>
    <script src="js/script.js"></script>
    <script src="js/danmaku.js"></script>
    <script src="js/features.js"></script>
</body>
</html>
